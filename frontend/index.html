<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Cards</title>
    <style>
        .pregame-container{
            text-align: center;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /*overflow: hidden; /* Prevent scrolling */
            box-sizing: border-box;
        }

        * {
            box-sizing: inherit;
        }

        .game-container {
            display: none;
            flex-wrap: wrap;
            width: 100%;
            height: 100%;
            /* border: 5px solid black; */
            box-sizing: border-box;
            position: relative;
        }

        .player-card {
            position: absolute;
            display: inline-flex;
            flex-wrap: wrap; /* Allow cards to wrap within the container */
            align-items: center;
            justify-content: center;
            width: 30%; /* Adjust width dynamically based on content */
            height: auto; /* Adjust height dynamically based on content */
            padding: 10px; /* Add some padding for spacing */
            border: 3px solid #333;
            border-radius: 10px;
            background-color: white;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .player-card h2 {
            width: 100%;
            padding: 1%;
            margin: 0;
            text-align: center;
        }

        .player-card img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            position: static; /* Changed from absolute to static to allow stacking */
        }

        .player3 {
            top: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        .player4 {
            top: 50%;
            right: 0;
            transform: translateY(-50%);
        }

        .player1 {
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        .player2 {
            top: 50%;
            left: 0;
            transform: translateY(-50%);
        }

        .center-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 30%;
            height: 15%;
        }

        .center-card {
            width: 45%;
            height: 100%;
            border: 3px solid #333;
            border-radius: 10px;
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .center-card h3 {
            margin: 0;
            font-size: 1.2rem;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="pregame-container" id="pregame-screen">
        <div id="pregameUtilities">
            <button id="createRoom">Create Room</button>
            <button id="joinRoom">Join Room</button>
        </div>
    </div>
    <div class="game-container" id="game-screen">
        <div class="player-card player1">
            <h2>Player 1</h2>
        </div>
        <div class="player-card player2">
            <h2>Player 2</h2>
        </div>
        <div class="player-card player3">
            <h2>Player 3</h2>
        </div>
        <div class="player-card player4">
            <h2>Player 4</h2>
        </div>
        <div class="center-container">
            <div class="cards-played center-card">
                <h3>Cards Played</h3>
            </div>
            <div class="center-card">
                <h3>Card Source</h3>
            </div>
        </div>
    </div>
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js" integrity="sha384-kzavj5fiMwLKzzD1f8S7TeoVIEi7uKHvbTA3ueZkrzYq75pNQUiUi6Dy98Q3fxb0" crossorigin="anonymous"></script>
    <script src="index.js"></script>
    <script src="game.js"></script>
</body>
</html>
